spring:
  datasource:
    url: ${AUTH_DATASOURCE_URL:jdbc:postgresql://localhost:5433/auth}
    username: ${AUTH_DATASOURCE_USERNAME:auth}
    password: ${AUTH_DATASOURCE_PASSWORD:auth}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: ${AUTH_SERVER_PORT:8081}

logging:
  file:
    name: ${AUTH_LOGGING_FILE_NAME:logs/clippy-auth-server.log}
