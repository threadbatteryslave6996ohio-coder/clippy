spring:
  datasource:
    url: ${AUTH_DATASOURCE_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/clippy}}
    username: ${AUTH_DATASOURCE_USERNAME:${SPRING_DATASOURCE_USERNAME:clippy}}
    password: ${AUTH_DATASOURCE_PASSWORD:${SPRING_DATASOURCE_PASSWORD:clippy}}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: ${AUTH_SERVER_PORT:8081}

logging:
  file:
    name: ${AUTH_LOGGING_FILE_NAME:logs/clippy-auth-server.log}
